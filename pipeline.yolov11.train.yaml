seed: 42
# 修改為你的資料集根目錄（影片與對應 .json 標註在同資料夾內）
dataset:
  root: "C:/Users/asas1/OneDrive/Desktop/workflow_test"
  split:
    method: "video_level"
    ratios: [0.8, 0.2]   # train/test
    k_fold: 1            # >1 可開啟 K-fold 驗證

experiments:
  - name: "exp_yolov11_train"
    pipeline:
      # 可選前處理（建議與推論一致）；不需要可移除此區塊
      - type: "preproc"
        name: "CLAHE"
        params: { clipLimit: 2.0, tileGridSize: [8,8] }
      # YOLOv11 模型（Ultralytics）
      - type: "model"
        name: "YOLOv11"
        params:
          # 推論/訓練共用
          weights: "yolo11n.pt"  # 可改成本地 ckpt 路徑
          device: "cuda"          # 無 CUDA 會自動 fallback 到 cpu
          imgsz: 640
          conf: 0.25
          iou: 0.5
          max_det: 100
          # 訓練參數（可依需要調整）
          epochs: 30
          batch: 8
          lr0: 0.01
          patience: 50
          workers: 0               # Windows 建議 0
          include_empty_frames: false  # 若要輸出無 GT 幀，改為 true

# 評估器與選項
# restrict_to_gt_frames: 僅在有 GT 的幀上計算評分，避免未標註幀影響結果
# visualize: 可選擇輸出部分幀的 GT/Pred 疊圖
# 注意：可視化在 val/test 階段進行

# 視覺化預設關閉；可在 UI 勾選或在此開啟

evaluation:
  evaluator: "BasicEvaluator"
  restrict_to_gt_frames: true
  visualize:
    enabled: false
    samples: 10


