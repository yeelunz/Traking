queue:
  # ═══════════════════════════════════════════════════════════════════════════
  # 00  共用錨點定義 (不執行任何實驗)
  # ═══════════════════════════════════════════════════════════════════════════
  # 資料：dataset/merged_extend
  # 分割策略：Non-LOSO（subject_level 8:2）
  # 前處理：Global CLAHE
  # 偵測器：YOLOv11l
  # 分割模型：MedNeXt-B
  # 分類實驗主題：
  #   (A) v1 + Non-TSC PLS(132→32) + TSC 時間軸 256→64
  #   (B) v3lite 原生特徵 + TSC 直接 n_steps=64
  # ═══════════════════════════════════════════════════════════════════════════
  - label: "00_defs"
    config:
      seed: 42

      dataset: &dataset_merged_noloso
        root: "C:\\Users\\User\\Desktop\\code\\Traking\\dataset\\merged_extend"
        split:
          method: subject_level
          loso: false
          ratios: [0.8, 0.2]
          k_fold: 1

      experiments: []

      evaluation: &evaluation_defaults
        evaluator: BasicEvaluator
        restrict_to_gt_frames: true
        visualize:
          enabled: true
          samples: 12
          strategy: even_spread
          include_detection: true
          include_segmentation: true
          ensure_first_last: true

      output: &output_defaults
        results_root: results

      trajectory_filter: &trajectory_filter_defaults
        bbox_strategy: none

      detector: &detector_yolo11l
        weights: models/detection/yolo26l.pt
        conf: 0.05
        iou: 0.5
        imgsz: 640
        device: cuda
        classes: null
        max_det: 100
        fallback_last_prediction: true
        train_enabled: true
        epochs: 30
        batch: 8
        lr0: 0.01
        patience: 50
        workers: 0
        include_empty_frames: false
        force_cpu_if_no_cuda: true

      clahe_global: &clahe_global
        clipLimit: 2.0
        tileGridSize: [1, 1]

      segmentation_mednext: &seg_mednext
        model:
          name: mednext
          params:
            in_channels: 3
            classes: 1
            model_id: "B"
            kernel_size: 3
            deep_supervision: false
            dim: "2d"
        padding_min: 0.1
        padding_max: 0.15
        padding_inference: 0.15
        jitter: 0.02
        redundancy: 1
        target_size: [256, 256]
        epochs: 30
        batch_size: 2
        num_workers: 0
        lr: 0.0005
        weight_decay: 1.0e-05
        dice_weight: 1.0
        bce_weight: 1.0
        threshold: 0.5
        val_ratio: 0.1
        seed: 1337
        device: auto
        train: true
        inference_checkpoint: null

      label_file: &label_file
        "C:\\Users\\User\\Desktop\\code\\Traking\\dataset\\merged_extend\\ann.txt"

      # ── Feature extractors ──────────────────────────────────────────────────
      fe_mts_v1: &fe_mts_v1
        name: tab_v2
        params:
          resnet_device: auto
          aggregate_stats: ["mean", "std", "min", "max"]

      fe_ts_v1: &fe_ts_v1
        name: tsc_v2
        params:
          frame_w: 640.0
          frame_h: 480.0
          resnet_device: auto
          tex_pca_dim: 8

      fe_mts_v3lite: &fe_mts_v3lite
        name: tab_v3_lite
        params:
          aggregate_stats: ["mean", "std", "min", "max"]

      fe_ts_v3lite_64: &fe_ts_v3lite_64
        name: tsc_v3_lite
        params:
          frame_w: 640.0
          frame_h: 480.0
          interp_method: cubic
          n_steps: 64

      # ── Classification anchors: v1 + PLS ───────────────────────────────────
      clf_v1_mts_rf_pls32: &clf_v1_mts_rf_pls32
        enabled: true
        feature_extractor: *fe_mts_v1
        classifier:
          name: random_forest
          params:
            n_estimators: 200
            max_depth: null
            min_samples_leaf: 1
            class_weight: balanced
            random_state: 42
            n_jobs: -1
            dim_reduction: pls
            dim_reduction_params:
              n_components: 32
        segmentation:
          enabled: true
        label_file: *label_file
        level: video

      clf_v1_mts_tabpfn_pls32: &clf_v1_mts_tabpfn_pls32
        enabled: true
        feature_extractor: *fe_mts_v1
        classifier:
          name: tabpfn_v2
          params:
            n_ensemble_configurations: 32
            device: cpu
            dim_reduction: pls
            dim_reduction_params:
              n_components: 32
        segmentation:
          enabled: true
        label_file: *label_file
        level: video

      clf_v1_ts_multirocket_t64: &clf_v1_ts_multirocket_t64
        enabled: true
        feature_extractor: *fe_ts_v1
        classifier:
          name: multirocket
          params:
            n_kernels: 6250
            ridge_alpha: 1.0e-3
            seed: 42
            n_vars: 18
            n_steps: 256
            dim_reduction: autoencoder
            dim_reduction_target: 64
        segmentation:
          enabled: true
        label_file: *label_file
        level: video

      clf_v1_ts_patchtst_t64: &clf_v1_ts_patchtst_t64
        enabled: true
        feature_extractor: *fe_ts_v1
        classifier:
          name: patchtst
          params:
            patch_len: 16
            stride: 8
            d_model: 32
            ridge_alpha: 1.0e-3
            seed: 42
            n_vars: 18
            n_steps: 256
            dim_reduction: learned_projection
            dim_reduction_target: 64
        segmentation:
          enabled: true
        label_file: *label_file
        level: video

      # ── Classification anchors: v3lite (TSC 64-step) ─────────────────────
      clf_v3_mts_rf: &clf_v3_mts_rf
        enabled: true
        feature_extractor: *fe_mts_v3lite
        classifier:
          name: random_forest
          params:
            n_estimators: 200
            max_depth: null
            min_samples_leaf: 1
            class_weight: balanced
            random_state: 42
            n_jobs: -1
        segmentation:
          enabled: true
        label_file: *label_file
        level: video

      clf_v3_mts_tabpfn: &clf_v3_mts_tabpfn
        enabled: true
        feature_extractor: *fe_mts_v3lite
        classifier:
          name: tabpfn_v2
          params:
            n_ensemble_configurations: 32
            device: cpu
        segmentation:
          enabled: true
        label_file: *label_file
        level: video

      clf_v3_ts_multirocket_64: &clf_v3_ts_multirocket_64
        enabled: true
        feature_extractor: *fe_ts_v3lite_64
        classifier:
          name: multirocket
          params:
            n_kernels: 6250
            ridge_alpha: 1.0e-3
            seed: 42
            n_vars: 12
            n_steps: 64
        segmentation:
          enabled: true
        label_file: *label_file
        level: video

      clf_v3_ts_patchtst_64: &clf_v3_ts_patchtst_64
        enabled: true
        feature_extractor: *fe_ts_v3lite_64
        classifier:
          name: patchtst
          params:
            patch_len: 16
            stride: 8
            d_model: 32
            ridge_alpha: 1.0e-3
            seed: 42
            n_vars: 12
            n_steps: 64
        segmentation:
          enabled: true
        label_file: *label_file
        level: video

  # ═══════════════════════════════════════════════════════════════════════════
  #  v1 + PLS + T64
  # ═══════════════════════════════════════════════════════════════════════════
  - label: "01_v1_mts_rf_pls32"
    config:
      seed: 42
      dataset: *dataset_merged_noloso
      experiments:
        - name: "mednext_clahe_global_v1_mts_rf_pls32"
          preproc_scheme: "A"
          pipeline:
            - type: preproc
              name: CLAHE
              params: *clahe_global
            - type: model
              name: YOLOv11
              params: *detector_yolo11l
      evaluation: *evaluation_defaults
      classification: *clf_v1_mts_rf_pls32
      segmentation: *seg_mednext
      output: *output_defaults
      trajectory_filter: *trajectory_filter_defaults

  - label: "02_v1_mts_tabpfn_pls32"
    config:
      seed: 42
      dataset: *dataset_merged_noloso
      experiments:
        - name: "mednext_clahe_global_v1_mts_tabpfn_pls32"
          preproc_scheme: "A"
          pipeline:
            - type: preproc
              name: CLAHE
              params: *clahe_global
            - type: model
              name: YOLOv11
              params: *detector_yolo11l
      evaluation: *evaluation_defaults
      classification: *clf_v1_mts_tabpfn_pls32
      segmentation: *seg_mednext
      output: *output_defaults
      trajectory_filter: *trajectory_filter_defaults

  - label: "03_v1_ts_multirocket_t64"
    config:
      seed: 42
      dataset: *dataset_merged_noloso
      experiments:
        - name: "mednext_clahe_global_v1_ts_multirocket_t64"
          preproc_scheme: "A"
          pipeline:
            - type: preproc
              name: CLAHE
              params: *clahe_global
            - type: model
              name: YOLOv11
              params: *detector_yolo11l
      evaluation: *evaluation_defaults
      classification: *clf_v1_ts_multirocket_t64
      segmentation: *seg_mednext
      output: *output_defaults
      trajectory_filter: *trajectory_filter_defaults

  - label: "04_v1_ts_patchtst_t64"
    config:
      seed: 42
      dataset: *dataset_merged_noloso
      experiments:
        - name: "mednext_clahe_global_v1_ts_patchtst_t64"
          preproc_scheme: "A"
          pipeline:
            - type: preproc
              name: CLAHE
              params: *clahe_global
            - type: model
              name: YOLOv11
              params: *detector_yolo11l
      evaluation: *evaluation_defaults
      classification: *clf_v1_ts_patchtst_t64
      segmentation: *seg_mednext
      output: *output_defaults
      trajectory_filter: *trajectory_filter_defaults

  # ═══════════════════════════════════════════════════════════════════════════
  #  v3lite (native) + TSC n_steps=64
  # ═══════════════════════════════════════════════════════════════════════════
  - label: "05_v3lite_mts_rf"
    config:
      seed: 42
      dataset: *dataset_merged_noloso
      experiments:
        - name: "mednext_clahe_global_v3lite_mts_rf"
          preproc_scheme: "A"
          pipeline:
            - type: preproc
              name: CLAHE
              params: *clahe_global
            - type: model
              name: YOLOv11
              params: *detector_yolo11l
      evaluation: *evaluation_defaults
      classification: *clf_v3_mts_rf
      segmentation: *seg_mednext
      output: *output_defaults
      trajectory_filter: *trajectory_filter_defaults

  - label: "06_v3lite_mts_tabpfn"
    config:
      seed: 42
      dataset: *dataset_merged_noloso
      experiments:
        - name: "mednext_clahe_global_v3lite_mts_tabpfn"
          preproc_scheme: "A"
          pipeline:
            - type: preproc
              name: CLAHE
              params: *clahe_global
            - type: model
              name: YOLOv11
              params: *detector_yolo11l
      evaluation: *evaluation_defaults
      classification: *clf_v3_mts_tabpfn
      segmentation: *seg_mednext
      output: *output_defaults
      trajectory_filter: *trajectory_filter_defaults

  - label: "07_v3lite_ts_multirocket_64"
    config:
      seed: 42
      dataset: *dataset_merged_noloso
      experiments:
        - name: "mednext_clahe_global_v3lite_ts_multirocket_64"
          preproc_scheme: "A"
          pipeline:
            - type: preproc
              name: CLAHE
              params: *clahe_global
            - type: model
              name: YOLOv11
              params: *detector_yolo11l
      evaluation: *evaluation_defaults
      classification: *clf_v3_ts_multirocket_64
      segmentation: *seg_mednext
      output: *output_defaults
      trajectory_filter: *trajectory_filter_defaults

  - label: "08_v3lite_ts_patchtst_64"
    config:
      seed: 42
      dataset: *dataset_merged_noloso
      experiments:
        - name: "mednext_clahe_global_v3lite_ts_patchtst_64"
          preproc_scheme: "A"
          pipeline:
            - type: preproc
              name: CLAHE
              params: *clahe_global
            - type: model
              name: YOLOv11
              params: *detector_yolo11l
      evaluation: *evaluation_defaults
      classification: *clf_v3_ts_patchtst_64
      segmentation: *seg_mednext
      output: *output_defaults
      trajectory_filter: *trajectory_filter_defaults
