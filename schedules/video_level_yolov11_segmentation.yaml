queue:
  # Shared dataset/eval/output
  - label: "00_defs"
    config:
      seed: 42
      dataset: &dataset_video
        root: "C:\\Users\\User\\Desktop\\超音波檔案-20251126T083302Z-1-001"
        split:
          method: video_level
          ratios: [0.8, 0.2]
          k_fold: 1
      experiments: []
      evaluation: &evaluation_defaults
        evaluator: BasicEvaluator
        restrict_to_gt_frames: true
        visualize:
          enabled: true
          samples: 12
          strategy: even_spread
          include_detection: true
          include_segmentation: true
          ensure_first_last: true
      classification: {enabled: false}
      output: &output_defaults
        results_root: results

      # Detector anchors
      detectors:
        plain: &detector_plain
          weights: models/detection/best_large_no_clahe.pt
          conf: 0.25
          iou: 0.5
          imgsz: 640
          device: cuda
          classes: null
          max_det: 100
          fallback_last_prediction: true
          train_enabled: true
          epochs: 30
          batch: 8
          lr0: 0.01
          patience: 50
          workers: 0
          include_empty_frames: false
          force_cpu_if_no_cuda: true
        clahe: &detector_clahe
          <<: *detector_plain
          weights: models/detection/best_large_clahe.pt
        logdr: &detector_logdr
          <<: *detector_plain
          weights: models/detection/yolo11l.pt

      # Segmentation anchors (all train 80 epochs)
      seg_nnunet: &seg_nnunet
        model:
          name: nnunet
          params:
            dimension: 2
            n_stages: 5
            base_features: 32
            deep_supervision: false
            return_highres_only: true
            init_weights: true
        padding_min: 0.1
        padding_max: 0.15
        padding_inference: 0.15
        jitter: 0.0
        redundancy: 1
        target_size: [256, 256]
        epochs: 80
        batch_size: 2
        num_workers: 0
        lr: 0.0005
        weight_decay: 1.0e-05
        dice_weight: 1.0
        bce_weight: 1.0
        threshold: 0.5
        val_ratio: 0.1
        seed: 1337
        device: auto
        train: true
        inference_checkpoint: null

      seg_unetpp: &seg_unetpp
        model:
          name: unetpp
          params:
            encoder_name: resnet34
            encoder_weights: imagenet
            in_channels: 3
            classes: 1
        padding_min: 0.1
        padding_max: 0.15
        padding_inference: 0.15
        jitter: 0.05
        redundancy: 1
        target_size: [256, 256]
        epochs: 80
        batch_size: 8
        num_workers: 0
        lr: 0.0005
        weight_decay: 1.0e-05
        dice_weight: 1.0
        bce_weight: 1.0
        threshold: 0.5
        val_ratio: 0.1
        seed: 1337
        device: auto
        train: true
        inference_checkpoint: null

      seg_medsam: &seg_medsam
        model:
          name: medsam
          params:
            checkpoint: models/seg/medsam_vit_b.pth
            model_type: vit_b
            use_box_prompt: true
            multimask_output: false
            train_enabled: true
        padding_min: 0.1
        padding_max: 0.15
        padding_inference: 0.15
        jitter: 0.0
        redundancy: 1
        target_size: [256, 256]
        epochs: 80
        batch_size: 2
        num_workers: 0
        lr: 0.0001
        weight_decay: 1.0e-05
        dice_weight: 1.0
        bce_weight: 1.0
        threshold: 0.5
        val_ratio: 0.0
        seed: 1337
        device: auto
        train: true
        inference_checkpoint: null

      seg_automask: &seg_automask
        model:
          name: auto_mask
          params:
            margin: 0.24
            num_iter: 0
            canny_low: 30
            canny_high: 80
            edge_weight_beta: 10.0
            postprocess_kernel: 3
            open_iter: 0
            close_iter: 1
            dilate_iter: 4
            use_mgac: false
        padding_min: 0.10
        padding_max: 0.15
        padding_inference: 0.18
        jitter: 0.0
        redundancy: 1
        target_size: [256, 256]
        epochs: 80
        batch_size: 1
        num_workers: 0
        lr: 0.0005
        weight_decay: 0.0
        dice_weight: 1.0
        bce_weight: 1.0
        threshold: 0.5
        val_ratio: 0.0
        seed: 1337
        device: auto
        train: true
        inference_checkpoint: null

      seg_deeplab: &seg_deeplab
        model:
          name: "deeplabv3+"
          params:
            encoder_name: resnet34
            encoder_weights: imagenet
            in_channels: 3
            classes: 1
        padding_min: 0.1
        padding_max: 0.15
        padding_inference: 0.15
        jitter: 0.05
        redundancy: 1
        target_size: [256, 256]
        epochs: 80
        batch_size: 8
        num_workers: 0
        lr: 0.0005
        weight_decay: 1.0e-05
        dice_weight: 1.0
        bce_weight: 1.0
        threshold: 0.5
        val_ratio: 0.1
        seed: 1337
        device: auto
        train: true
        inference_checkpoint: null

  # Experiments: each combination of preprocess x segmentation model
  # Preprocess pipelines
  - label: "01_none_nnunet"
    config:
      seed: 42
      dataset: *dataset_video
      experiments:
        - name: "none_nnunet"
          pipeline:
            - type: model
              name: YOLOv11
              params: *detector_plain
      evaluation: *evaluation_defaults
      classification: {enabled: false}
      segmentation: *seg_nnunet
      output: *output_defaults

  - label: "02_none_unetpp"
    config:
      seed: 42
      dataset: *dataset_video
      experiments:
        - name: "none_unetpp"
          pipeline:
            - type: model
              name: YOLOv11
              params: *detector_plain
      evaluation: *evaluation_defaults
      classification: {enabled: false}
      segmentation: *seg_unetpp
      output: *output_defaults

  - label: "03_none_medsam"
    config:
      seed: 42
      dataset: *dataset_video
