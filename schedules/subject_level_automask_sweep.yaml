queue:
  - label: "01_automask_no_mgac_dilate4_baseline"
    config:
      seed: 42
      dataset:
        root: "C:\\Users\\User\\Desktop\\超音波檔案-20251126T083302Z-1-001"
        split:
          method: loso
          loso: true
          ratios: [0.8, 0.2]
          k_fold: 1
      experiments:
        - name: "automask_no_mgac_dilate4_baseline"
          pipeline:
            - type: model
              name: YOLOv11
              params: &detector_base
                weights: models/detection/best_large_no_clahe.pt
                conf: 0.25
                iou: 0.5
                imgsz: 640
                device: cuda
                classes: null
                max_det: 100
                fallback_last_prediction: true
                train_enabled: false
                epochs: 0
                batch: 8
                lr0: 0.01
                patience: 50
                workers: 0
                include_empty_frames: false
                force_cpu_if_no_cuda: true
      evaluation: &evaluation_defaults
        evaluator: BasicEvaluator
        restrict_to_gt_frames: true
        visualize:
          enabled: true
          samples: 12
          strategy: even_spread
          include_detection: true
          include_segmentation: true
          ensure_first_last: true
      classification:
        enabled: false
      segmentation: &segmentation_base
        model:
          name: auto_mask
          params:
            margin: 0.26
            num_iter: 0
            canny_low: 20
            canny_high: 60
            edge_weight_beta: 10.0
            postprocess_kernel: 5
            open_iter: 0
            close_iter: 1
            dilate_iter: 4
            use_mgac: false
        padding_min: 0.10
        padding_max: 0.15
        padding_inference: 0.18
        jitter: 0.0
        redundancy: 1
        target_size: [256, 256]
        epochs: 0
        batch_size: 1
        num_workers: 0
        lr: 0.0
        weight_decay: 0.0
        dice_weight: 1.0
        bce_weight: 1.0
        threshold: 0.5
        val_ratio: 0.0
        seed: 1337
        device: auto
        train: false
        inference_checkpoint: null
      output: &output_defaults
        results_root: results

