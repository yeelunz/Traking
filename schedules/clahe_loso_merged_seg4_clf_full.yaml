      experiments:
        - name: "deeplabv3p_mts_rf"
          preproc_scheme: "A"
          pipeline:
            - type: preproc
              name: CLAHE
              params: *clahe_default
            - type: model
              name: YOLOv11
              params: *detector_yolo11l
