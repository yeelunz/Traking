queue:
  # ═══════════════════════════════════════════════════════════════════════════
  # 00  共用錨點定義（EXTEND / LOSO / tab_v4+tsc_v3_pro）
  # ═══════════════════════════════════════════════════════════════════════════
  - label: "00_defs"
    config:
      seed: 42

      dataset: &dataset_merged_loso
        root: "C:\\Users\\User\\Desktop\\code\\Traking\\dataset\\merged_extend"
        split:
          method: loso
          loso: true
          ratios: [0.8, 0.2]
          k_fold: 1

      experiments: []

      evaluation: &evaluation_defaults
        evaluator: BasicEvaluator
        restrict_to_gt_frames: true
        visualize:
          enabled: true
          samples: 12
          strategy: even_spread
          include_detection: true
          include_segmentation: true
          ensure_first_last: true

      output: &output_defaults
        results_root: results

      trajectory_filter: &trajectory_filter_defaults
        bbox_strategy: none

      detector: &detector_yolo11l
        weights: models/detection/yolo26l.pt
        conf: 0.05
        iou: 0.5
        imgsz: 640
        device: cuda
        classes: null
        max_det: 100
        fallback_last_prediction: true
        train_enabled: true
        epochs: 30
        batch: 8
        lr0: 0.01
        patience: 50
        workers: 0
        include_empty_frames: false
        force_cpu_if_no_cuda: true

      clahe_global: &clahe_global
        clipLimit: 2.0
        tileGridSize: [1, 1]

      segmentation_mednext: &seg_mednext
        model:
          name: mednext
          params:
            in_channels: 3
            classes: 1
            model_id: "B"
            kernel_size: 3
            deep_supervision: false
            dim: "2d"
        padding_min: 0.1
        padding_max: 0.15
        padding_inference: 0.15
        jitter: 0.02
        redundancy: 1
        target_size: [256, 256]
        epochs: 30
        batch_size: 2
        num_workers: 0
        lr: 0.0005
        weight_decay: 1.0e-05
        dice_weight: 1.0
        bce_weight: 1.0
        threshold: 0.5
        val_ratio: 0.1
        seed: 1337
        device: auto
        train: true
        inference_checkpoint: null

      label_file: &label_file
        "C:\\Users\\User\\Desktop\\code\\Traking\\dataset\\merged_extend\\ann.txt"

      fusion_concat: &fusion_concat
        name: concat
        params: {}

      fe_tab_v4_pretrain: &fe_tab_v4_pretrain
        name: tab_v4
        params:
          texture_mode: pretrain
          pretrained_backbone: true
          n_texture_frames: 5
          texture_image_size: 96
          roi_pad_ratio: 0.15

      fe_tsc_v3pro_pretrain: &fe_tsc_v3pro_pretrain
        name: tsc_v3_pro
        params:
          texture_mode: pretrain
          pretrained_backbone: true
          n_steps: 256
          frame_w: 640.0
          frame_h: 480.0
          interp_method: cubic

      clf_tabv4_rf_concat: &clf_tabv4_rf_concat
        enabled: true
        feature_extractor: *fe_tab_v4_pretrain
        classifier:
          name: random_forest
          params:
            n_estimators: 200
            max_depth: null
            min_samples_leaf: 1
            class_weight: balanced
            random_state: 42
            n_jobs: -1
        fusion_module: *fusion_concat
        segmentation:
          enabled: true
        label_file: *label_file
        level: video

      clf_tabv4_tabpfn_concat: &clf_tabv4_tabpfn_concat
        enabled: true
        feature_extractor: *fe_tab_v4_pretrain
        classifier:
          name: tabpfn_v2
          params:
            n_ensemble_configurations: 32
            device: cpu
        fusion_module: *fusion_concat
        segmentation:
          enabled: true
        label_file: *label_file
        level: video

      clf_tabv4_limix_concat: &clf_tabv4_limix_concat
        enabled: true
        feature_extractor: *fe_tab_v4_pretrain
        classifier:
          name: limix
          params:
            model_path: ckpt/limix/LimiX-16M.ckpt
            inference_config_path: libs/LimiX/config/cls_default_noretrieval.json
            device: cpu
            mix_precision: false
            softmax_temperature: 0.9
            outlier_remove_std: 12.0
            seed: 42
        fusion_module: *fusion_concat
        segmentation:
          enabled: true
        label_file: *label_file
        level: video

      clf_tscv3pro_multirocket_concat: &clf_tscv3pro_multirocket_concat
        enabled: true
        feature_extractor: *fe_tsc_v3pro_pretrain
        classifier:
          name: multirocket
          params:
            n_kernels: 6250
            ridge_alpha: 1.0e-3
            seed: 42
            n_vars: 12
            n_steps: 256
        fusion_module: *fusion_concat
        segmentation:
          enabled: true
        label_file: *label_file
        level: video

      clf_tscv3pro_patchtst_concat: &clf_tscv3pro_patchtst_concat
        enabled: true
        feature_extractor: *fe_tsc_v3pro_pretrain
        classifier:
          name: patchtst
          params:
            patch_len: 16
            stride: 8
            d_model: 32
            ridge_alpha: 1.0e-3
            seed: 42
            n_vars: 12
            n_steps: 256
        fusion_module: *fusion_concat
        segmentation:
          enabled: true
        label_file: *label_file
        level: video

      clf_tscv3pro_timesnet_concat: &clf_tscv3pro_timesnet_concat
        enabled: true
        feature_extractor: *fe_tsc_v3pro_pretrain
        classifier:
          name: timesnet
          params:
            e_layers: 2
            d_model: 32
            d_ff: 64
            top_k: 3
            num_kernels: 6
            dropout: 0.1
            epochs: 80
            lr: 1.0e-3
            weight_decay: 1.0e-3
            batch_size: 64
            patience: 15
            seed: 42
            n_vars: 12
            n_steps: 256
        fusion_module: *fusion_concat
        segmentation:
          enabled: true
        label_file: *label_file
        level: video

  # ═══════════════════════════════════════════════════════════════════════════
  # 01  tab_v4(pretrain) + Random Forest + concat
  # ═══════════════════════════════════════════════════════════════════════════
  - label: "01_tabv4_rf_concat"
    config:
      seed: 42
      dataset: *dataset_merged_loso
      experiments:
        - name: "mednext_clahe_global_tabv4_rf_concat"
          preproc_scheme: "A"
          pipeline:
            - type: preproc
              name: CLAHE
              params: *clahe_global
            - type: model
              name: YOLOv11
              params: *detector_yolo11l
      evaluation: *evaluation_defaults
      classification: *clf_tabv4_rf_concat
      segmentation: *seg_mednext
      output: *output_defaults
      trajectory_filter: *trajectory_filter_defaults

  # ═══════════════════════════════════════════════════════════════════════════
  # 02  tab_v4(pretrain) + TabPFN + concat
  # ═══════════════════════════════════════════════════════════════════════════
  - label: "02_tabv4_tabpfn_concat"
    config:
      seed: 42
      dataset: *dataset_merged_loso
      experiments:
        - name: "mednext_clahe_global_tabv4_tabpfn_concat"
          preproc_scheme: "A"
          pipeline:
            - type: preproc
              name: CLAHE
              params: *clahe_global
            - type: model
              name: YOLOv11
              params: *detector_yolo11l
      evaluation: *evaluation_defaults
      classification: *clf_tabv4_tabpfn_concat
      segmentation: *seg_mednext
      output: *output_defaults
      trajectory_filter: *trajectory_filter_defaults

  # ═══════════════════════════════════════════════════════════════════════════
  # 03  tsc_v3_pro(pretrain) + MultiRocket + concat
  # ═══════════════════════════════════════════════════════════════════════════
  - label: "03_tscv3pro_multirocket_concat"
    config:
      seed: 42
      dataset: *dataset_merged_loso
      experiments:
        - name: "mednext_clahe_global_tscv3pro_multirocket_concat"
          preproc_scheme: "A"
          pipeline:
            - type: preproc
              name: CLAHE
              params: *clahe_global
            - type: model
              name: YOLOv11
              params: *detector_yolo11l
      evaluation: *evaluation_defaults
      classification: *clf_tscv3pro_multirocket_concat
      segmentation: *seg_mednext
      output: *output_defaults
      trajectory_filter: *trajectory_filter_defaults

  # ═══════════════════════════════════════════════════════════════════════════
  # 04  tab_v4(pretrain) + LimiX + concat
  # ═══════════════════════════════════════════════════════════════════════════
  - label: "04_tabv4_limix_concat"
    config:
      seed: 42
      dataset: *dataset_merged_loso
      experiments:
        - name: "mednext_clahe_global_tabv4_limix_concat"
          preproc_scheme: "A"
          pipeline:
            - type: preproc
              name: CLAHE
              params: *clahe_global
            - type: model
              name: YOLOv11
              params: *detector_yolo11l
      evaluation: *evaluation_defaults
      classification: *clf_tabv4_limix_concat
      segmentation: *seg_mednext
      output: *output_defaults
      trajectory_filter: *trajectory_filter_defaults

  # ═══════════════════════════════════════════════════════════════════════════
  # 05  tsc_v3_pro(pretrain) + PatchTST + concat
  # ═══════════════════════════════════════════════════════════════════════════
  - label: "05_tscv3pro_patchtst_concat"
    config:
      seed: 42
      dataset: *dataset_merged_loso
      experiments:
        - name: "mednext_clahe_global_tscv3pro_patchtst_concat"
          preproc_scheme: "A"
          pipeline:
            - type: preproc
              name: CLAHE
              params: *clahe_global
            - type: model
              name: YOLOv11
              params: *detector_yolo11l
      evaluation: *evaluation_defaults
      classification: *clf_tscv3pro_patchtst_concat
      segmentation: *seg_mednext
      output: *output_defaults
      trajectory_filter: *trajectory_filter_defaults

  # ═══════════════════════════════════════════════════════════════════════════
  # 06  tsc_v3_pro(pretrain) + TimesNet + concat
  # ═══════════════════════════════════════════════════════════════════════════
  - label: "06_tscv3pro_timesnet_concat"
    config:
      seed: 42
      dataset: *dataset_merged_loso
      experiments:
        - name: "mednext_clahe_global_tscv3pro_timesnet_concat"
          preproc_scheme: "A"
          pipeline:
            - type: preproc
              name: CLAHE
              params: *clahe_global
            - type: model
              name: YOLOv11
              params: *detector_yolo11l
      evaluation: *evaluation_defaults
      classification: *clf_tscv3pro_timesnet_concat
      segmentation: *seg_mednext
      output: *output_defaults
      trajectory_filter: *trajectory_filter_defaults
