queue:
  - label: "01_clahe_yolov11_unetpp"
    config:
      seed: 42
      dataset: &dataset_subject
        root: "C:\\Users\\User\\Desktop\\超音波檔案-20251126T083302Z-1-001"
        split:
          method: subject_level
          ratios:
            - 0.8
            - 0.2
          k_fold: 1
      experiments:
        - name: "clahe_yolov11_unetpp"
          pipeline:
            - type: preproc
              name: CLAHE
              params:
                clip: 2.0
                grid: [8, 8]
            - type: model
              name: YOLOv11
              params: &detector_clahe
                weights: models/detection/best_large_clahe.pt
                conf: 0.25
                iou: 0.5
                imgsz: 640
                device: cuda
                classes: null
                max_det: 100
                fallback_last_prediction: true
                train_enabled: false
                epochs: 0
                batch: 8
                lr0: 0.01
                patience: 50
                workers: 0
                include_empty_frames: false
                force_cpu_if_no_cuda: true
      evaluation: &evaluation_defaults
        evaluator: BasicEvaluator
        restrict_to_gt_frames: true
        visualize:
          enabled: true
          samples: 12
          strategy: even_spread
          include_detection: true
          include_segmentation: true
          ensure_first_last: true
      classification:
        enabled: false
      segmentation: &segmentation_unetpp
        model:
          name: unetpp
          params:
            encoder_name: resnet34
            encoder_weights: imagenet
            in_channels: 3
            classes: 1
        padding_min: 0.1
        padding_max: 0.15
        padding_inference: 0.15
        jitter: 0.05
        redundancy: 1
        target_size: [256, 256]
        epochs: 40
        batch_size: 8
        num_workers: 0
        lr: 0.0005
        weight_decay: 1.0e-05
        dice_weight: 1.0
        bce_weight: 1.0
        threshold: 0.5
        val_ratio: 0.1
        seed: 1337
        device: auto
        train: true
        inference_checkpoint: null
      output: &output_defaults
        results_root: results

  - label: "02_yolov11_unetpp"
    config:
      seed: 42
      dataset: *dataset_subject
      experiments:
        - name: "yolov11_unetpp"
          pipeline:
            - type: model
              name: YOLOv11
              params: &detector_plain
                weights: models/detection/best_large_no_clahe.pt
                conf: 0.25
                iou: 0.5
                imgsz: 640
                device: cuda
                classes: null
                max_det: 100
                fallback_last_prediction: true
                train_enabled: false
                epochs: 0
                batch: 8
                lr0: 0.01
                patience: 50
                workers: 0
                include_empty_frames: false
                force_cpu_if_no_cuda: true
      evaluation: *evaluation_defaults
      classification:
        enabled: false
      segmentation: *segmentation_unetpp
      output: *output_defaults

  - label: "03_clahe_yolov11_medsam"
    config:
      seed: 42
      dataset: *dataset_subject
      experiments:
        - name: "clahe_yolov11_medsam"
          pipeline:
            - type: preproc
              name: CLAHE
              params:
                clip: 2.0
                grid: [8, 8]
            - type: model
              name: YOLOv11
              params: *detector_clahe
      evaluation: *evaluation_defaults
      classification:
        enabled: false
      segmentation: &segmentation_medsam
        model:
          name: medsam
          params:
            checkpoint: models/seg/medsam_vit_b.pth
            model_type: vit_b
            use_box_prompt: true
            multimask_output: false
            train_enabled: true
        padding_min: 0.1
        padding_max: 0.15
        padding_inference: 0.15
        jitter: 0.0
        redundancy: 1
        target_size: [256, 256]
        epochs: 30
        batch_size: 2
        num_workers: 0
        lr: 0.0001
        weight_decay: 1.0e-05
        dice_weight: 1.0
        bce_weight: 1.0
        threshold: 0.5
        val_ratio: 0.0
        seed: 1337
        device: auto
        train: true
        inference_checkpoint: null
      output: *output_defaults

  - label: "04_yolov11_medsam"
    config:
      seed: 42
      dataset: *dataset_subject
      experiments:
        - name: "yolov11_medsam"
          pipeline:
            - type: model
              name: YOLOv11
              params: *detector_plain
      evaluation: *evaluation_defaults
      classification:
        enabled: false
      segmentation: *segmentation_medsam
      output: *output_defaults

