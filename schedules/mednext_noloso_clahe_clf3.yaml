queue:
  # ═══════════════════════════════════════════════════════════════════════════
  # 00  共用錨點定義 (不執行任何實驗)
  # ═══════════════════════════════════════════════════════════════════════════
  # 資料：dataset/merged（含患病 001–005 與正常 n001–n007）
  # 分割策略：Non-LOSO（subject_level 8:2 隨機分割）
  # 前處理：Global CLAHE（無 LOG_DR）
  # 偵測器：YOLOv11l
  # 分割模型：MedNeXt-B
  # 分類：video level
  #   表格特徵 (motion_texture_static) → Random Forest
  #   時序特徵 (time_series, 18ch×128) → MultiRocket / PatchTST
  # ═══════════════════════════════════════════════════════════════════════════
  - label: "00_defs"
    config:
      seed: 42

      # ── 資料集：Non-LOSO（subject_level 隨機 8:2 分割）──────────────────────────
      dataset: &dataset_merged_noloso
        root: "C:\\Users\\User\\Desktop\\code\\Traking\\dataset\\merged"
        split:
          method: subject_level
          loso: false
          ratios: [0.8, 0.2]
          k_fold: 1

      experiments: []

      evaluation: &evaluation_defaults
        evaluator: BasicEvaluator
        restrict_to_gt_frames: true
        visualize:
          enabled: true
          samples: 12
          strategy: even_spread
          include_detection: true
          include_segmentation: true
          ensure_first_last: true

      output: &output_defaults
        results_root: results

      # ── ROI 偵測器：YOLOv11l ─────────────────────────────────────────────────
      detector: &detector_yolo11l
        weights: models/detection/yolo11l.pt
        conf: 0.05
        iou: 0.5
        imgsz: 640
        device: cuda
        classes: null
        max_det: 100
        fallback_last_prediction: true
        train_enabled: true
        epochs: 30
        batch: 8
        lr0: 0.01
        patience: 50
        workers: 0
        include_empty_frames: false
        force_cpu_if_no_cuda: true

      # ── 前處理：Global CLAHE（tileGridSize=[1,1] = 單一大區塊，等效全域）────────
      clahe_global: &clahe_global
        clipLimit: 2.0
        tileGridSize: [1, 1]

      # ── 分割模型：MedNeXt-B ──────────────────────────────────────────────────
      segmentation_mednext: &seg_mednext
        model:
          name: mednext
          params:
            in_channels: 3
            classes: 1
            model_id: "B"
            kernel_size: 3
            deep_supervision: false
            dim: "2d"
        padding_min: 0.1
        padding_max: 0.15
        padding_inference: 0.15
        jitter: 0.02
        redundancy: 1
        target_size: [256, 256]
        epochs: 30
        batch_size: 2
        num_workers: 0
        lr: 0.0005
        weight_decay: 1.0e-05
        dice_weight: 1.0
        bce_weight: 1.0
        threshold: 0.5
        val_ratio: 0.1
        seed: 1337
        device: auto
        train: true
        inference_checkpoint: null

      # ── 標籤檔 ────────────────────────────────────────────────────────────────
      label_file: &label_file
        "C:\\Users\\User\\Desktop\\code\\Traking\\dataset\\merged\\ann.txt"

      # ── 特徵提取器：表格式（Motion 31D + CTS Static 35D + ResNet Texture PCA 66D）
      fe_mts: &fe_mts
        name: motion_texture_static
        params:
          kalman_process_noise: 0.01
          kalman_measurement_noise: 0.1
          resnet_device: auto
          aggregate_stats: ["mean", "std", "min", "max"]

      # ── 特徵提取器：時序式（18ch × 128 steps：10 幾何 + 8 ResNet 紋理 PCA）───────
      fe_ts: &fe_ts
        name: time_series
        params:
          frame_w: 640.0
          frame_h: 480.0
          resnet_device: auto
          tex_pca_dim: 8

      # ══════════════════════════════════════════════════════════════════════════
      #  分類設定錨點
      # ══════════════════════════════════════════════════════════════════════════

      # ─ Random Forest（motion_texture_static → 132D）──────────────────────────
      clf_mts_rf: &clf_mts_rf
        enabled: true
        feature_extractor: *fe_mts
        classifier:
          name: random_forest
          params:
            n_estimators: 200
            max_depth: null
            min_samples_leaf: 1
            class_weight: balanced
            random_state: 42
            n_jobs: -1
        segmentation:
          enabled: false  # use masks from main pipeline seg stage
          params: {}
        label_file: *label_file
        level: video

      # ─ MultiRocket（time_series → 18ch × 128 steps）──────────────────────────
      clf_ts_multirocket: &clf_ts_multirocket
        enabled: true
        feature_extractor: *fe_ts
        classifier:
          name: multirocket
          params:
            n_kernels: 6250
            ridge_alpha: 1.0e-3
            seed: 42
        segmentation:
          enabled: false  # use masks from main pipeline seg stage
          params: {}
        label_file: *label_file
        level: video

      # ─ PatchTST（time_series → 18ch × 128 steps）─────────────────────────────
      clf_ts_patchtst: &clf_ts_patchtst
        enabled: true
        feature_extractor: *fe_ts
        classifier:
          name: patchtst
          params:
            patch_len: 16
            stride: 8
            d_model: 32
            ridge_alpha: 1.0e-3
            seed: 42
        segmentation:
          enabled: false  # use masks from main pipeline seg stage
          params: {}
        label_file: *label_file
        level: video


  # ═══════════════════════════════════════════════════════════════════════════
  #  MedNeXt × Random Forest  (01)
  # ═══════════════════════════════════════════════════════════════════════════
  - label: "01_mednext_mts_rf"
    config:
      seed: 42
      dataset: *dataset_merged_noloso
      experiments:
        - name: "mednext_clahe_global_mts_rf"
          preproc_scheme: "A"
          pipeline:
            - type: preproc
              name: CLAHE
              params: *clahe_global
            - type: model
              name: YOLOv11
              params: *detector_yolo11l
      evaluation: *evaluation_defaults
      classification: *clf_mts_rf
      segmentation: *seg_mednext
      output: *output_defaults

  # ═══════════════════════════════════════════════════════════════════════════
  #  MedNeXt × MultiRocket  (02)
  # ═══════════════════════════════════════════════════════════════════════════
  - label: "02_mednext_ts_multirocket"
    config:
      seed: 42
      dataset: *dataset_merged_noloso
      experiments:
        - name: "mednext_clahe_global_ts_multirocket"
          preproc_scheme: "A"
          pipeline:
            - type: preproc
              name: CLAHE
              params: *clahe_global
            - type: model
              name: YOLOv11
              params: *detector_yolo11l
      evaluation: *evaluation_defaults
      classification: *clf_ts_multirocket
      segmentation: *seg_mednext
      output: *output_defaults

  # ═══════════════════════════════════════════════════════════════════════════
  #  MedNeXt × PatchTST  (03)
  # ═══════════════════════════════════════════════════════════════════════════
  - label: "03_mednext_ts_patchtst"
    config:
      seed: 42
      dataset: *dataset_merged_noloso
      experiments:
        - name: "mednext_clahe_global_ts_patchtst"
          preproc_scheme: "A"
          pipeline:
            - type: preproc
              name: CLAHE
              params: *clahe_global
            - type: model
              name: YOLOv11
              params: *detector_yolo11l
      evaluation: *evaluation_defaults
      classification: *clf_ts_patchtst
      segmentation: *seg_mednext
      output: *output_defaults
