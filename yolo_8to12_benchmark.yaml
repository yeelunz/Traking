seed: 42

dataset:
  root: "C:/Users/User/Desktop/翊倫實驗資料/CTS資料集/us_0912_relabel"
  split:
    method: video_level
    ratios:
      - 0.8   # 80% 視訊用於訓練
      - 0.2   # 20% 視訊用於最終測試
    k_fold: 1

output:
  skip_pip_freeze: true

experiments:
  - name: yolov8_n_train
    pipeline:
      - type: model
        name: YOLOv11
        params:
          weights: "yolov8n.pt"
          conf: 0.25
          iou: 0.65
          imgsz: 640
          max_det: 100
          device: cuda
          batch: 16
          epochs: 50
          lr0: 0.01
          patience: 50
          workers: 0
          fallback_last_prediction: true
          include_empty_frames: false

  - name: yolov8_l_train
    pipeline:
      - type: model
        name: YOLOv11
        params:
          weights: "yolov8l.pt"
