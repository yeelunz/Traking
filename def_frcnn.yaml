seed: 42

dataset:
  root: "C:/Users/asas1/OneDrive/Desktop/workflow_test"   # 改成你的資料根目錄（影片 + 同名 .json）
  split:
    method: "video_level"
    ratios: [0.8, 0.2]                  # train/test
    k_fold: 1

experiments:
  - name: "exp_no_pre_FasterRCNN"
    pipeline:
      - type: "model"
        name: "FasterRCNN"
        params:
          device: "cuda"                # 若無 CUDA 會自動退回 CPU
          pretrained: true
          num_classes: 2                # 背景+單一前景
          epochs: 5
          batch_size: 2

          # 優化器與學習率（穩定版）
          optimizer: "AdamW"
          lr: 0.0005                    # 建議 1e-4 ~ 5e-4 起
          weight_decay: 0.0005
          adamw_betas: [0.9, 0.999]
          adamw_eps: 1.0e-8             # AdamW 預設為 1e-8

          # LR 調度
          step_size: 2
          gamma: 0.1

          # DataLoader（Windows 建議）
          num_workers: 0
          pin_memory: false

          # 訓練穩定性
          grad_clip: 1.0
          detect_anomaly: false         # 排查 NaN 時可暫時開啟

          # 資料處理
          include_empty_frames: false   # 只用有 GT 的幀訓練

          # 推論/評估行為
          fallback_last_prediction: true  # 當幀無偵測時用上一幀預測補齊（有助評估覆蓋率）
          score_thresh: 0.5               # 目前 predict 不套用門檻，保留此參數供日後需要

evaluation:
  evaluator: "BasicEvaluator"
  visualize:
    enabled: true
    samples: 10

