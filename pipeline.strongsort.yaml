seed: 42

dataset:
  # 修改為你的資料集根目錄（影片與同名 .json）
  root: "C:/path/to/your/dataset"
  split:
    method: "video_level"
    ratios: [0.8, 0.2]
    k_fold: 1

experiments:
  - name: "exp_StrongSORT_default"
    pipeline:
      # 可視需求插入 preproc 步驟，如 CLAHE
      # - type: "preproc"
      #   name: "CLAHE"
      #   params: {clipLimit: 2.0, tileGridSize: [8,8]}
      - type: "model"
        name: "StrongSORT"
        params:
          # YOLO 偵測參數
          weights: "yolo11n.pt"
          conf: 0.25
          iou: 0.5
          imgsz: 640
          device: "cuda"  # 無 GPU 時改成 "cpu"
          classes: null
          max_det: 300
          # StrongSORT 追蹤參數
          max_cosine_distance: 0.3
          nn_budget: 100
          max_iou_distance: 0.7
          max_age: 30
          n_init: 3
          feature_bins: 16
          min_confidence: 0.05
          fallback_last_prediction: true

evaluation:
  evaluator: "BasicEvaluator"
  visualize:
    enabled: true
    samples: 10
