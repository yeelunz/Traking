seed: 42

dataset:
  root: "C:/path/to/your/dataset"
  split:
    method: "video_level"
    ratios: [0.8, 0.2]
    k_fold: 1

experiments:
  - name: "exp_StrongSORTpp_default"
    pipeline:
      # 可在此插入預處理模組
      - type: "model"
        name: "StrongSORT++"
        params:
          # YOLO 偵測參數
          weights: "yolo11n.pt"
          conf: 0.25
          iou: 0.5
          imgsz: 640
          device: "cuda"
          classes: null
          max_det: 300
          # StrongSORT 超參數
          max_cosine_distance: 0.3
          nn_budget: 100
          max_iou_distance: 0.7
          max_age: 30
          n_init: 3
          feature_bins: 24
          min_confidence: 0.05
          fallback_last_prediction: true
          use_yolo_fallback: true
          # StrongSORT++後處理
          enable_gsi: true
          gsi_interval: 30
          enable_gaussian_smoothing: true
          smoothing_sigma: 1.5
          score_fill_value: 0.65
          clip_scores_between: [0.0, 1.0]

evaluation:
  evaluator: "BasicEvaluator"
  visualize:
    enabled: true
    samples: 10
