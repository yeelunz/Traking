seed: 42

# 單次流水線設定，重新訓練 YOLOv12-L 並執行推論/評估
# 可用指令：python run_pipeline.py --config pipeline.yolov12_l_retry.yaml

dataset:
  root: "C:/Users/User/Desktop/翊倫實驗資料/CTS資料集/us_0912_relabel"
  split:
    method: video_level
    ratios: [0.8, 0.2]   # train / test
    k_fold: 1

output:
  skip_pip_freeze: true
  # results_root 可自訂；預設寫入專案的 results/ 目錄

experiments:
  - name: yolov12_l_retry
    pipeline:
      - type: model
        name: YOLOv11
        params:
          weights: "yolo12l.pt"
          conf: 0.25
          iou: 0.65
          imgsz: 640
          max_det: 100
          device: cuda
          # 針對 L 模型調整，降低 batch / lr 以避免 nan
          batch: 8
          epochs: 50
          lr0: 0.005
          patience: 50
          workers: 0
          fallback_last_prediction: true
          include_empty_frames: false
          # 若訓練仍不穩，可改用 cpu 或把 batch 再降到 4

evaluation:
  evaluator: BasicEvaluator
  restrict_to_gt_frames: true
