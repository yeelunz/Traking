seed: 42
dataset:
  root: C:/path/to/your/dataset
  split:
    method: video_level
    ratios:
    - 0.8
    - 0.2
    k_fold: 1
experiments:
- name: exp_no_pre_TaMOs
  pipeline:
  - type: model
    name: TaMOs
    params:
      parameter: tamos_resnet50
      device: cuda
      force_cpu_if_no_cuda: true
      fallback_last_prediction: true
      min_presence_score: 0.0
      param_overrides: {}
      fine_tune:
        enabled: false
        command: null  # e.g. "python -m ltr.run_training tracking tamos_resnet50 --save-dir {output_dir}"
        cwd: null      # defaults to libs/pytracking
        checkpoint: null  # e.g. "ltr/checkpoints/ltr/tracking/tamos_resnet50/finetuned_ep0005.pth.tar"
        env: {}
evaluation:
  evaluator: BasicEvaluator
