seed: 42

dataset:
  root: "C:/Users/User/Desktop/翊倫實驗資料/CTS資料集/us_0912_relabel"
  split:
    method: video_level
    ratios:
      - 0.8
      - 0.2
    k_fold: 1

experiments:
  - name: mixformer_ablation_gt
    pipeline:
      - type: model
        name: MixFormerV2
        params:
          train_enabled: true
          train_epochs: 15
          train_freeze_backbone: false
          first_frame_source: gt

  - name: mixformer_ablation_init_large
    pipeline:
      - type: model
        name: MixFormerV2
        params:
          train_enabled: true
          train_epochs: 15
          train_freeze_backbone: false
          first_frame_source: yolov11
          init_detector_weights: "best(large).pt"

  - name: mixformer_ablation_init_nano
    pipeline:
      - type: model
        name: MixFormerV2
        params:
          train_enabled: true
          train_epochs: 15
          train_freeze_backbone: false
          first_frame_source: yolov11
          init_detector_weights: best.pt

  - name: mixformer_ablation_init_large_reinit_large
    pipeline:
      - type: model
        name: MixFormerV2
        params:
          train_enabled: true
          train_epochs: 15
          train_freeze_backbone: false
          first_frame_source: yolov11
          init_detector_weights: "best(large).pt"
          low_confidence_reinit:
            enabled: true
            threshold: 0.9999999
            detector:
              weights: "best(large).pt"
            detector_min_conf: 0.01

  - name: mixformer_ablation_init_nano_reinit_nano
    pipeline:
      - type: model
        name: MixFormerV2
        params:
          train_enabled: true
          train_epochs: 15
          train_freeze_backbone: false
          first_frame_source: yolov11
          init_detector_weights: best.pt
          low_confidence_reinit:
            enabled: true
            threshold: 0.9999999
            detector:
              weights: best.pt
            detector_min_conf: 0.01

  - name: mixformer_ablation_init_large_reinit_nano
    pipeline:
      - type: model
        name: MixFormerV2
        params:
          train_enabled: true
          train_epochs: 15
          train_freeze_backbone: false
          first_frame_source: yolov11
          init_detector_weights: "best(large).pt"
          low_confidence_reinit:
            enabled: true
            threshold: 0.9999999
            detector:
              weights: best.pt
            detector_min_conf: 0.01

  - name: mixformer_ablation_init_nano_reinit_large
    pipeline:
      - type: model
        name: MixFormerV2
        params:
          train_enabled: true
          train_epochs: 15
          train_freeze_backbone: false
          first_frame_source: yolov11
          init_detector_weights: best.pt
          low_confidence_reinit:
            enabled: true
            threshold: 0.9999999
            detector:
              weights: "best(large).pt"
            detector_min_conf: 0.01

evaluation:
  evaluator: BasicEvaluator
