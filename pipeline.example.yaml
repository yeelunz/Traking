seed: 42
dataset:
  root: "C:/Users/asas1/OneDrive/Desktop/workflow_test"  # change to dataset root containing videos + .json from label tool
  # dataset split options (video-level)
  split:
    method: "video_level"
    ratios: [0.8, 0.2]  # train/test
    k_fold: 1  # set >1 to enable K-fold; folds are drawn within the training set
experiments:
  - name: "exp_clahe_template"
    pipeline:
      - type: "preproc"
        name: "CLAHE"
        params: {clipLimit: 2.0, tileGridSize: [8,8]}
      - type: "model"
        name: "TemplateMatching"
        params: {template_size: [64,64], search_margin: 32}
evaluation:
  evaluator: "BasicEvaluator"
