seed: 42

dataset:
  # 將此處改為你的資料集根目錄（影片與同名 .json）
  root: "C:/Users/asas1/OneDrive/Desktop/workflow_test"
  split:
    method: "video_level"
    ratios: [0.8, 0.2]
    k_fold: 1

experiments:
  - name: "exp_FASTSpeckle_auto_init"
    pipeline:
      # 若需要可啟用 CLAHE 或其它 preproc，預設留空
      # - type: "preproc"
      #   name: "CLAHE"
      #   params: {clipLimit: 2.0, tileGridSize: [8,8]}
      - type: "model"
        name: "FASTSpeckle"
        params:
          # FAST detector
          fast_threshold: 20
          fast_nonmax: true
          max_features: 220
          # LK optical flow
          lk_win_size: 19
          lk_max_level: 3
          # reinit / maintenance
          min_features: 28
          reinit_interval: 8
          # first-frame init (auto = GT first, fallback to YOLOv11)
          first_frame_source: auto
          first_frame_fallback: yolov11
          init_detector_weights: best.pt
          init_detector_conf: 0.2
          init_detector_iou: 0.45
          init_detector_imgsz: 960
          init_detector_device: auto
          init_detector_classes: null
          init_detector_max_det: 25

evaluation:
  evaluator: "BasicEvaluator"
  visualize:
    enabled: true
    samples: 10

classification:
  enabled: false
  # label_file: "C:/path/to/ann.txt"  # defaults to dataset.root/ann.txt
  target_level: "video"
  feature_extractor:
    name: "basic"
    params: {}
  classifier:
    name: "random_forest"
    params:
      n_estimators: 200
      random_state: 42

# Note: output/results_root intentionally omitted — UI enforces project-local results folder.
